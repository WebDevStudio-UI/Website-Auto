<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contattaci | AutoElite</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <header>
        <div class="logo"><h2><i class="fas fa-car"></i> AutoElite</h2></div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#inventario">Inventario</a></li>
                <li><a href="azienda.html">Chi Siamo & Servizi</a></li>
                <li><a href="contatti.html" class="btn-primary">Contattaci</a></li>
            </ul>
        </nav>
    </header>

    <section class="page-header contact-header">
        <h1>Contattaci</h1>
    </section>

    <section class="contact-section">
        <div class="contact-info">
            <h3>I nostri recapiti</h3>
            <p>Via delle Automobili 123, 20100 Milano (MI)<br>+39 02 1234567<br>info@autoelite.it</p>
        </div>
        <div class="contact-form">
            <h3>Inviaci un messaggio</h3>
            <form onsubmit="inviaMessaggio(event)">
                <div class="form-group"><input type="text" placeholder="Nome" required></div>
                <div class="form-group"><input type="email" placeholder="Email" required></div>
                <div class="form-group"><textarea rows="4" placeholder="Messaggio" required></textarea></div>
                <button type="submit" class="btn-primary btn-submit">Invia Richiesta</button>
            </form>
        </div>
    </section>

    <footer>
        <div class="footer-bottom"><p>&copy; 2026 AutoElite. Tutti i diritti riservati.</p></div>
    </footer>
    <script src="script.js"></script>
</body>
</html>
